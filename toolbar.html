<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    padding: 8px 6px 16px;
    font-family: var(--vscode-font-family);
    font-size: var(--vscode-font-size);
    color: var(--vscode-foreground);
    background: transparent;
  }

  .group-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    opacity: 0.55;
    margin: 12px 0 5px 3px;
  }
  .group-label:first-child { margin-top: 2px; }

  .btn {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 5px 8px;
    margin-bottom: 2px;
    background: var(--vscode-button-secondaryBackground);
    color: var(--vscode-button-secondaryForeground);
    border: 1px solid transparent;
    border-radius: 3px;
    cursor: pointer;
    gap: 7px;
    transition: background 0.1s;
  }
  .btn:hover {
    background: var(--vscode-button-secondaryHoverBackground);
    border-color: var(--vscode-focusBorder);
  }
  .btn:active { opacity: 0.75; }

  .ico {
    width: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .ico svg { display: block; }
  .lbl { flex: 1; text-align: left; font-size: 12px; }
  .cmd {
    font-family: var(--vscode-editor-font-family, monospace);
    font-size: 10px;
    opacity: 0.45;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="group-label">Text Formatting</div>

<button class="btn" onclick="send('bold')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <text x="2" y="13" font-size="14" font-weight="900" font-family="Georgia,serif" fill="currentColor">B</text>
    </svg>
  </span>
  <span class="lbl">Bold</span>
  <span class="cmd">&#92;textbf{}</span>
</button>

<button class="btn" onclick="send('italic')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <text x="5" y="13" font-size="14" font-style="italic" font-family="Georgia,serif" fill="currentColor">I</text>
    </svg>
  </span>
  <span class="lbl">Italic</span>
  <span class="cmd">&#92;textit{}</span>
</button>

<button class="btn" onclick="send('monospace')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <text x="0" y="12" font-size="9.5" font-family="Consolas,'Courier New',monospace" fill="currentColor">&lt;/&gt;</text>
    </svg>
  </span>
  <span class="lbl">Monospace</span>
  <span class="cmd">&#92;texttt{}</span>
</button>

<button class="btn" onclick="send('underline')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <text x="3" y="11" font-size="12" font-family="Georgia,serif" fill="currentColor">U</text>
      <rect x="2" y="13" width="11" height="1.5"/>
    </svg>
  </span>
  <span class="lbl">Underline</span>
  <span class="cmd">&#92;underline{}</span>
</button>

<div class="group-label">Lists</div>

<button class="btn" onclick="send('itemize')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <circle cx="2.5" cy="4" r="1.3"/>
      <circle cx="2.5" cy="8" r="1.3"/>
      <circle cx="2.5" cy="12" r="1.3"/>
      <rect x="5" y="3" width="10" height="2" rx="1"/>
      <rect x="5" y="7" width="10" height="2" rx="1"/>
      <rect x="5" y="11" width="10" height="2" rx="1"/>
    </svg>
  </span>
  <span class="lbl">Bullet list</span>
  <span class="cmd">&#92;itemize{}</span>
</button>

<button class="btn" onclick="send('enumerate')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <text x="0.5" y="5.5" font-size="5" font-family="sans-serif" font-weight="bold" fill="currentColor">1.</text>
      <text x="0.5" y="9.5" font-size="5" font-family="sans-serif" font-weight="bold" fill="currentColor">2.</text>
      <text x="0.5" y="13.5" font-size="5" font-family="sans-serif" font-weight="bold" fill="currentColor">3.</text>
      <rect x="5" y="3" width="10" height="2" rx="1"/>
      <rect x="5" y="7" width="10" height="2" rx="1"/>
      <rect x="5" y="11" width="10" height="2" rx="1"/>
    </svg>
  </span>
  <span class="lbl">Numbered list</span>
  <span class="cmd">&#92;enumerate{}</span>
</button>

<div class="group-label">Blocks</div>

<button class="btn" onclick="send('lstlisting')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <!-- < and > angle brackets + slash = code icon -->
      <path d="M5.7 3.3L1 8l4.7 4.7 1.3-1.3L3.7 8l3.3-3.3L5.7 3.3zm4.6 0l-1.3 1.4L12.3 8 9 11.4l1.3 1.3L15 8l-4.7-4.7zM8.7 2.5l-1.5.3L7.3 13.5l1.5-.3L8.7 2.5z"/>
    </svg>
  </span>
  <span class="lbl">Inline code</span>
  <span class="cmd">&#92;lstlisting{}</span>
</button>

<button class="btn" onclick="send('lstinputlisting')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <!-- File icon with code lines -->
      <path fill-rule="evenodd" d="M9.5 1H3a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V5.5L9.5 1zM9 2v4h4v8H3V2h6z"/>
      <path d="M4.8 8.5L3.5 9.5l1.3 1-.6.8L2 9.5 4.2 8l.6.5zm2.4 2.5l.6-.5 1.3-1-1.3-1L8.2 8l2.2 1.5-2.2 1.5-.6-.5zM6 7.8l-1.5 4.4 1.4.5L7.4 8.3 6 7.8z"/>
    </svg>
  </span>
  <span class="lbl">External code</span>
  <span class="cmd">&#92;lstinputlisting{}</span>
</button>

<button class="btn" onclick="send('tcolorbox')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <!-- Note box with left accent bar -->
      <path fill-rule="evenodd" d="M1 2h14v12H1V2zm1 1v10h12V3H2z"/>
      <rect x="2" y="3" width="3" height="10"/>
    </svg>
  </span>
  <span class="lbl">Colored box</span>
  <span class="cmd">&#92;tcolorbox{}</span>
</button>

<div class="group-label">Images</div>

<button class="btn" onclick="send('figure')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <!-- Picture frame -->
      <path fill-rule="evenodd" d="M1 2h14v12H1V2zm1 1v10h12V3H2z"/>
      <!-- Mountain silhouette -->
      <path d="M2 11.5l3.5-4 2.5 2.8 1.5-1.8 3.5 3H2z"/>
      <!-- Sun -->
      <circle cx="11.5" cy="5.5" r="1.3"/>
    </svg>
  </span>
  <span class="lbl">Figure</span>
  <span class="cmd">&#92;figure{}</span>
</button>

<button class="btn" onclick="send('figures')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <!-- Left frame -->
      <path fill-rule="evenodd" d="M1 3h7v9H1V3zm1 1v7h5V4H2z"/>
      <!-- Left mountain + sun -->
      <path d="M2 10.5l1.8-2.2 1.3 1.5.9-1 1 1.7H2z"/>
      <circle cx="6" cy="5.5" r=".9"/>
      <!-- Right frame -->
      <path fill-rule="evenodd" d="M8 3h7v9H8V3zm1 1v7h5V4H9z"/>
      <!-- Right mountain + sun -->
      <path d="M9 10.5l1.8-2.2 1.3 1.5.9-1 1 1.7H9z"/>
      <circle cx="13" cy="5.5" r=".9"/>
    </svg>
  </span>
  <span class="lbl">2 Figures</span>
  <span class="cmd">&#92;minipage{}</span>
</button>

<div class="group-label">Extras</div>

<button class="btn" onclick="send('footnote')">
  <span class="ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <text x="1" y="13" font-size="10" font-family="sans-serif" fill="currentColor">fn</text>
      <text x="10" y="6" font-size="7" font-family="sans-serif" fill="currentColor">1</text>
    </svg>
  </span>
  <span class="lbl">Footnote</span>
  <span class="cmd">&#92;footnote{}</span>
</button>

<script>
  const vscode = acquireVsCodeApi();
  function send(command) { vscode.postMessage({ command }); }
</script>
</body>
</html>
